name: Release

# Triggered by pushing a version tag (e.g. v0.15.0).
# Builds, signs, notarises, and publishes artifacts for all desktop platforms,
# then creates a GitHub Release with the generated assets.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v0.15.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Pre-flight: verify tag format and extract version
  # ---------------------------------------------------------------------------
  version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building release for ${TAG} (version ${VERSION})"

  # ---------------------------------------------------------------------------
  # Windows — MSI + NSIS installer
  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows (x86_64)
    needs: [version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with: { node-version: 24 }

      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            crates -> target

      - uses: taiki-e/install-action@v2
        with: { tool: tauri-cli }

      - name: Build release installer
        run: cargo tauri build --ci
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: EV Code Sign
        shell: pwsh
        env:
          CERT_B64: ${{ secrets.WINDOWS_CERTIFICATE }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:CERT_B64) {
            Write-Host "::warning::WINDOWS_CERTIFICATE secret not set — skipping signing"
            exit 0
          }
          $certPath = "${{ runner.temp }}\codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:CERT_B64))
          $bundleDir = "src-tauri\target\release\bundle"
          Get-ChildItem -Path $bundleDir -Filter "*.msi" -Recurse | ForEach-Object {
            signtool sign /fd SHA256 /f "$certPath" /p "$env:CERT_PASSWORD" /tr http://timestamp.digicert.com /td SHA256 /v $_.FullName
          }
          Get-ChildItem -Path $bundleDir -Filter "*.exe" -Recurse | ForEach-Object {
            signtool sign /fd SHA256 /f "$certPath" /p "$env:CERT_PASSWORD" /tr http://timestamp.digicert.com /td SHA256 /v $_.FullName
          }
          Remove-Item $certPath -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-x86_64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS — universal binary (arm64 + x86_64) + notarisation
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS (universal)
    needs: [version]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with: { node-version: 24 }

      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            crates -> target

      - uses: taiki-e/install-action@v2
        with: { tool: tauri-cli }

      - name: Build release DMG (universal)
        run: cargo tauri build --ci --target universal-apple-darwin
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(ls src-tauri/target/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          if [ -z "$DMG" ]; then
            echo "::error::No DMG found"
            exit 1
          fi
          echo "Submitting $DMG for notarization..."
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"
          echo "Notarization complete."

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-macos-universal
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux — AppImage + deb + rpm
  # ---------------------------------------------------------------------------
  build-linux:
    name: Linux (x86_64)
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with: { node-version: 24 }

      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf libssl-dev

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-unknown-linux-gnu }

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            crates -> target

      - uses: taiki-e/install-action@v2
        with: { tool: tauri-cli }

      - name: Build release packages
        run: cargo tauri build --ci
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-linux-x86_64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage*
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  publish:
    name: Publish GitHub Release
    needs: [version, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.msi' -o -name '*.exe' -o -name '*.sig' -o -name '*.dmg' -o -name '*.AppImage*' -o -name '*.deb' -o -name '*.rpm' -o -name '*.app.tar.gz' \) \
            -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate Tauri updater manifest
        env:
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path("artifacts")
          repo = os.environ["REPOSITORY"]
          tag = os.environ["TAG"]
          version = os.environ["VERSION"]

          def first(pattern: str):
              return next(root.rglob(pattern), None)

          def asset_url(path: Path) -> str:
              return f"https://github.com/{repo}/releases/download/{tag}/{path.name}"

          def signature_for(path: Path) -> str | None:
              sig = Path(f"{path}.sig")
              if sig.exists():
                  return sig.read_text(encoding="utf-8").strip()
              return None

          def add_platform(platforms: dict, key: str, path: Path | None):
              if path is None:
                  return
              signature = signature_for(path)
              if not signature:
                  return
              platforms[key] = {
                  "signature": signature,
                  "url": asset_url(path),
              }

          platforms = {}
          windows = first("*.exe") or first("*.msi")
          macos = first("*.app.tar.gz")
          linux = first("*.AppImage")

          add_platform(platforms, "windows-x86_64", windows)
          add_platform(platforms, "darwin-x86_64", macos)
          add_platform(platforms, "darwin-aarch64", macos)
          add_platform(platforms, "linux-x86_64", linux)

          if not platforms:
              raise SystemExit("No signed updater artifacts found")

          manifest = {
              "version": version,
              "notes": f"CFMS Client {version}",
              "pub_date": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              "platforms": platforms,
          }

          (root / "latest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          VERSION: ${{ needs.version.outputs.version }}
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: CFMS Client ${{ needs.version.outputs.version }}
          body: |
            <!-- channel: ${{ contains(needs.version.outputs.version, 'alpha') && 'alpha' || contains(needs.version.outputs.version, 'beta') && 'beta' || 'stable' }} -->

            ## CFMS Client ${{ needs.version.outputs.version }}

            ### 📦 Downloads

            | Platform | Package |
            |----------|---------|
            | Windows  | MSI installer, NSIS installer (signed) |
            | macOS    | DMG (universal — Apple Silicon + Intel, notarised) |
            | Linux    | AppImage, deb, rpm |

            ### 🔐 Integrity

            SHA256 checksums are included in `SHA256SUMS.txt`.

            ### ✍️ Signing

            - **Windows**: EV Code Signed
            - **macOS**: Notarised by Apple
            - **Linux**: Signed via Tauri updater key

            ---
            🤖 Built by [GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          files: |
            artifacts/release-windows-x86_64/*
            artifacts/release-macos-universal/*
            artifacts/release-linux-x86_64/*
            artifacts/SHA256SUMS.txt
            artifacts/latest.json
          draft: false
          prerelease: ${{ contains(needs.version.outputs.version, '-') }}
          generate_release_notes: true
