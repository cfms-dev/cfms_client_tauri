  # ---------------------------------------------------------------------------
  # Linux — AppImage + deb + rpm
  # ---------------------------------------------------------------------------
  build-linux:
    name: Linux (x86_64)
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            crates -> target

      - uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli

      - name: Build release packages
        run: cargo tauri build --ci
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-linux-x86_64
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage*
            target/release/bundle/rpm/*.rpm
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Android — APK + AAB
  # ---------------------------------------------------------------------------
  build-android:
    name: Android (aarch64 + x86_64)
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: "25"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            crates -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Android signing
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > "$RUNNER_TEMP/keystore.jks"
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Build Tauri Android
        run: pnpm tauri android build --apk --aab --target aarch64 --target x86_64

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-android-aarch64-x86_64
          path: |
            src-tauri/gen/android/app/build/outputs/**/*.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  publish:
    name: Publish GitHub Release
    needs:
      - version
      - build-windows
      # - build-macos
      # - build-linux
      - build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Normalize artifact file names
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path("artifacts")
          for path in sorted(root.rglob("*"), key=lambda item: len(item.parts), reverse=True):
              if not path.is_file() or " " not in path.name:
                  continue

              target = path.with_name(path.name.replace(" ", "_"))
              if target.exists():
                  raise SystemExit(f"Cannot normalize {path}: {target} already exists")

              path.rename(target)
          PY

      - name: Generate checksums
        run: |
          cd artifacts

          find . -type f \( \
            -name '*.msi' \
            -o -name '*.exe' \
            -o -name '*.sig' \
            -o -name '*.dmg' \
            -o -name '*.AppImage*' \
            -o -name '*.deb' \
            -o -name '*.rpm' \
            -o -name '*.app.tar.gz' \
            -o -name '*.apk' \
            -o -name '*.aab' \
          \) -exec sha256sum {} \; > SHA256SUMS.txt

          cat SHA256SUMS.txt

      - name: Generate Tauri updater manifest
        env:
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path
          from urllib.parse import quote

          root = Path("artifacts")
          repo = os.environ["REPOSITORY"]
          tag = os.environ["TAG"]
          version = os.environ["VERSION"]

          def first(pattern: str):
              return next(root.rglob(pattern), None)

          def github_asset_name(path: Path) -> str:
              return path.name.replace(" ", "_")

          def asset_url(path: Path) -> str:
              return f"https://github.com/{repo}/releases/download/{tag}/{quote(github_asset_name(path))}"

          def signature_for(path: Path) -> str | None:
              sig = Path(f"{path}.sig")
              if sig.exists():
                  return sig.read_text(encoding="utf-8").strip()
              return None

          def add_platform(platforms: dict, key: str, path: Path | None):
              if path is None:
                  return

              signature = signature_for(path)
              if not signature:
                  return

              platforms[key] = {
                  "signature": signature,
                  "url": asset_url(path),
              }

          platforms = {}

          windows_nsis = first("*.exe")
          windows_msi = first("*.msi")
          windows = windows_nsis or windows_msi
          macos = first("*.app.tar.gz")
          linux = first("*.AppImage")

          add_platform(platforms, "windows-x86_64-nsis", windows_nsis)
          add_platform(platforms, "windows-x86_64-msi", windows_msi)
          add_platform(platforms, "windows-x86_64", windows)
          add_platform(platforms, "darwin-x86_64", macos)
          add_platform(platforms, "darwin-aarch64", macos)
          add_platform(platforms, "linux-x86_64", linux)

          if not platforms:
              raise SystemExit("No signed updater artifacts found")

          manifest = {
              "version": version,
              "notes": f"CFMS Client {version}",
              "pub_date": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              "platforms": platforms,
          }

          (root / "latest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          PY

      - name: Debug generated files
        run: |
          echo "After manifest generation:"
          find artifacts -type f -print
          test -f artifacts/latest.json && cat artifacts/latest.json || echo "latest.json NOT FOUND"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          VERSION: ${{ needs.version.outputs.version }}
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: CFMS Client ${{ needs.version.outputs.version }}
          body: |
            <!-- channel: ${{ contains(needs.version.outputs.version, 'alpha') && 'alpha' || contains(needs.version.outputs.version, 'beta') && 'beta' || 'stable' }} -->

            ## CFMS Client ${{ needs.version.outputs.version }}

            ### 📦 Downloads

            | Platform | Package |
            |----------|---------|
            | Windows  | MSI installer, NSIS installer (signed) |
            | macOS    | DMG (universal — Apple Silicon + Intel, notarised) |
            | Linux    | AppImage, deb, rpm |
            | Android  | APK, AAB |

            ### 🔐 Integrity

            SHA256 checksums are included in `SHA256SUMS.txt`.

            ### ✍️ Signing

            - **Windows**: EV Code Signed
            - **macOS**: Notarised by Apple
            - **Linux**: Signed via Tauri updater key
            - **Android**: Signed via Android keystore

            ---
            🤖 Built by [GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          files: |
            artifacts/release-windows-x86_64/**/*
            artifacts/release-android-aarch64-x86_64/**/*
            artifacts/SHA256SUMS.txt
            artifacts/latest.json
          draft: false
          prerelease: ${{ contains(needs.version.outputs.version, '-') }}
          generate_release_notes: true
