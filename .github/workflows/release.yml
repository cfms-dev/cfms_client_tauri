name: Release

# Triggered by pushing a version tag (e.g. v0.15.0).
# Builds, signs, notarises, and publishes artifacts for desktop platforms and Android,
# then creates a GitHub Release with the generated assets.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g. v0.15.0)"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NDK_VERSION: "29.0.14206865"

jobs:
  # ---------------------------------------------------------------------------
  # Pre-flight: verify tag format and extract version
  # ---------------------------------------------------------------------------
  version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          VERSION="${TAG#v}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building release for ${TAG} (version ${VERSION})"

  # ---------------------------------------------------------------------------
  # Windows — MSI + NSIS installer
  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows (x86_64)
    needs: [version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            crates -> target

      - uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli

      - name: Build release installer
        run: cargo tauri build --ci
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: EV Code Sign
        shell: pwsh
        env:
          CERT_B64: ${{ secrets.WINDOWS_CERTIFICATE }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:CERT_B64) {
            Write-Host "::warning::WINDOWS_CERTIFICATE secret not set — skipping signing"
            exit 0
          }

          $certPath = "${{ runner.temp }}\codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:CERT_B64))

          $bundleDir = "src-tauri\target\release\bundle"

          Get-ChildItem -Path $bundleDir -Filter "*.msi" -Recurse | ForEach-Object {
            signtool sign /fd SHA256 /f "$certPath" /p "$env:CERT_PASSWORD" /tr http://timestamp.digicert.com /td SHA256 /v $_.FullName
          }

          Get-ChildItem -Path $bundleDir -Filter "*.exe" -Recurse | ForEach-Object {
            signtool sign /fd SHA256 /f "$certPath" /p "$env:CERT_PASSWORD" /tr http://timestamp.digicert.com /td SHA256 /v $_.FullName
          }

          Remove-Item $certPath -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-x86_64
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/msi/*.sig
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sig
          if-no-files-found: error

