name: Build — macOS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'reference/**'
      - '.vscode/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: macOS (arm64 + x86_64)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            crates -> target

      - name: Install Tauri CLI
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli

      - name: Build release binary (universal)
        run: cargo tauri build --ci --target universal-apple-darwin
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ------------------------------------------------------------------
      # Apple Notarization
      #
      # Requires the following GitHub Secrets:
      #   APPLE_SIGNING_IDENTITY    — e.g. "Developer ID Application: ..."
      #   APPLE_CERTIFICATE         — Base64-encoded .p12 Developer ID certificate
      #   APPLE_CERTIFICATE_PASSWORD — .p12 certificate password
      #   APPLE_TEAM_ID             — Apple Developer Team ID
      #   APPLE_ID                  — Apple ID email for notarization
      #   APPLE_PASSWORD            — App-specific password for notarization
      # ------------------------------------------------------------------
      - name: Submit for Notarization
        if: github.event_name != 'pull_request'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          DMG=$(ls "$BUNDLE_DIR"/dmg/*.dmg 2>/dev/null | head -1)

          if [ -z "$DMG" ]; then
            echo "::warning::No DMG found — skipping notarization"
            exit 0
          fi

          echo "Submitting $DMG for notarization..."

          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG"

          echo "Notarization complete: $DMG"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cfms-client-macos-universal
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
          if-no-files-found: warn
