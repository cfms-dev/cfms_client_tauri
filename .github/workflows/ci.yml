name: CI

# Runs on every push and PR to main.
# Fast checks: Rust tests, clippy, frontend type-check, and format validation.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Rust — tests & clippy
  # ---------------------------------------------------------------------------
  rust-checks:
    name: Rust tests & clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            crates -> target

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace -- --test-threads=4

  # ---------------------------------------------------------------------------
  # Frontend — type-check & build
  # ---------------------------------------------------------------------------
  frontend-checks:
    name: Frontend type-check & build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 24
      
      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - run: pnpm install --frozen-lockfile

      - name: SvelteKit sync + type-check
        run: pnpm exec svelte-kit sync && pnpm svelte-check

      - name: Production build
        run: pnpm build
