name: Build — Windows

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'reference/**'
      - '.vscode/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Windows (x86_64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            crates -> target

      - name: Install Tauri CLI
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli

      - name: Build release binary
        run: cargo tauri build --ci
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ------------------------------------------------------------------
      # EV Code Signing (Windows)
      #
      # Requires the following GitHub Secrets:
      #   WINDOWS_CERTIFICATE       — Base64-encoded PFX certificate file
      #   WINDOWS_CERTIFICATE_PASSWORD — PFX password
      #
      # For Azure Key Vault / Azure Code Signing, use the
      # azure/azure-code-signing action instead.
      # ------------------------------------------------------------------
      - name: EV Code Sign — MSI & NSIS installers
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          CERT_B64: ${{ secrets.WINDOWS_CERTIFICATE }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:CERT_B64) {
            Write-Host "::warning::WINDOWS_CERTIFICATE secret not set — skipping signing"
            exit 0
          }

          # Decode and import the EV certificate
          $certPath = "${{ runner.temp }}\codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:CERT_B64))

          # Locate unsigned installers
          $bundleDir = "src-tauri\target\release\bundle"
          $msi = Get-ChildItem -Path $bundleDir -Filter "*.msi" -Recurse | Select-Object -First 1
          $nsis = Get-ChildItem -Path $bundleDir -Filter "*.exe" -Recurse | Select-Object -First 1

          if ($msi) {
            Write-Host "Signing MSI: $($msi.FullName)"
            signtool sign /fd SHA256 /f "$certPath" /p "$env:CERT_PASSWORD" `
              /tr http://timestamp.digicert.com /td SHA256 `
              /v "$($msi.FullName)"
          }

          if ($nsis) {
            Write-Host "Signing NSIS installer: $($nsis.FullName)"
            signtool sign /fd SHA256 /f "$certPath" /p "$env:CERT_PASSWORD" `
              /tr http://timestamp.digicert.com /td SHA256 `
              /v "$($nsis.FullName)"
          }

          Remove-Item $certPath -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cfms-client-windows-x86_64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
