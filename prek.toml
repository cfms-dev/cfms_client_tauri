[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
    { id = "check-yaml" },
    { id = "end-of-file-fixer" }
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "rustfmt"
name = "cargo rustfmt"
language = "system"
entry = "cargo"
args = ["fmt", "--all"]
pass_filenames = false
stages = ["pre-commit"]
